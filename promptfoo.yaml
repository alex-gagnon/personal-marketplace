# promptfoo.yaml — Format/schema assertions for Claude Code skills
#
# Runs Layer 1 (deterministic format checks) for all skills.
# For semantic quality evaluation, use the /test skill instead.
#
# Run locally:   npx promptfoo eval
# Run in CI:     npx promptfoo eval --ci

providers:
  - id: anthropic:claude-sonnet-4-6
    config:
      max_tokens: 2048

defaultTest:
  options:
    # Run each test 3 times; require 2/3 passes to account for LLM non-determinism
    repeat: 3
    threshold: 0.67

# ─── source-control ──────────────────────────────────────────────────────────
tests:
  - description: "source-control: routes commit intent — subject line ≤72 chars"
    vars:
      skill: source-control
      scenario: |
        Staged diff: adds a None check to process_order() in orders.py.
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill. Produce only the output the skill would generate."
    assert:
      - type: javascript
        value: |
          const firstLine = output.split('\n').find(l => l.trim().length > 0) || '';
          const subject = firstLine.replace(/^git commit -m ["']?/, '').replace(/["']?$/, '').trim();
          return subject.length <= 72;

  - description: "source-control: routes commit intent — refuses when nothing staged"
    vars:
      skill: source-control
      scenario: |
        git status shows modified files but git diff --staged is empty.
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill."
    assert:
      - type: not-contains
        value: "git commit"
      - type: llm-rubric
        value: "The response explains that nothing is staged and asks whether to stage specific files."

  - description: "source-control: routes commit intent — flags breaking change"
    vars:
      skill: source-control
      scenario: |
        Staged diff removes the public function getUserById() from a shared utility module.
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill."
    assert:
      - type: llm-rubric
        value: "The commit message signals a breaking change — either with a '!' suffix (e.g. 'feat!:') or a 'BREAKING CHANGE:' note."

  - description: "source-control: routes branch intent — one-line confirmation"
    vars:
      skill: source-control
      scenario: |
        User says "I want to create a branch for adding dark mode support." Repo is on main, working tree is clean.
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill."
    assert:
      - type: javascript
        value: |
          const lines = output.trim().split('\n').filter(l => l.trim().length > 0);
          return lines.length === 1;

  - description: "source-control: routes branch intent — descriptive slug"
    vars:
      skill: source-control
      scenario: |
        User: "I want to work on adding dark mode support."
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill."
    assert:
      - type: llm-rubric
        value: "The branch name contains a descriptive slug related to dark mode (e.g. 'dark-mode', 'dark-mode-support'), not a generic name like 'new-branch' or 'feature'."

  - description: "source-control: unclear intent — asks one clarifying question"
    vars:
      skill: source-control
      scenario: |
        User invokes /source-control with no additional context. No staged changes. No diff.
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill."
    assert:
      - type: llm-rubric
        value: "The response asks exactly one question covering all three options: commit, branch, or summarize a diff. It does not make assumptions or proceed without asking."

# ─── review-pr ───────────────────────────────────────────────────────────────
  - description: "review-pr: required section headers present"
    vars:
      skill: review-pr
      scenario: |
        PR #17 "Add user lookup endpoint" — diff shows SQL injection:
        db.query(f"SELECT * FROM users WHERE id = {user_id}") in api/users.py line 23.
        Run /review-pr.
    prompt: "{{scenario}}\n\nApply the /review-pr skill."
    assert:
      - type: contains
        value: "## PR Review:"
      - type: contains
        value: "### Summary"
      - type: contains
        value: "### Blocking"

  - description: "review-pr: file:line citation format"
    vars:
      skill: review-pr
      scenario: |
        PR #17 with SQL injection at api/users.py line 23.
        Run /review-pr.
    prompt: "{{scenario}}\n\nApply the /review-pr skill."
    assert:
      - type: regex
        value: "`[^`]+:\\d+`"

  - description: "review-pr: no empty sections"
    vars:
      skill: review-pr
      scenario: |
        PR adds a well-tested format_currency() function with full test coverage and a docstring.
        Only issue: trailing whitespace on line 14 of utils.py.
        Run /review-pr.
    prompt: "{{scenario}}\n\nApply the /review-pr skill."
    assert:
      - type: not-contains
        value: "### Blocking"
      - type: llm-rubric
        value: "The output does not contain any section with 'none', 'N/A', or an empty bullet under a heading."

# ─── grill ───────────────────────────────────────────────────────────────────
  - description: "grill: questions only, no recommendations"
    vars:
      skill: grill
      scenario: |
        Design to grill: "Migrate monolith to microservices, one service per team, REST between services."
        Run /grill.
    prompt: "{{scenario}}\n\nApply the /grill skill."
    assert:
      - type: llm-rubric
        value: "Every non-heading, non-empty line is a question (ends with '?'). There are no recommendations, suggestions, or 'you should' statements."

  - description: "grill: domain-grouped questions"
    vars:
      skill: grill
      scenario: |
        Idea to grill: "Add AI auto-reply to customer support that responds without human review."
        Run /grill.
    prompt: "{{scenario}}\n\nApply the /grill skill."
    assert:
      - type: regex
        value: "###.+"
      - type: javascript
        value: |
          const headings = (output.match(/^###.+/gm) || []);
          return headings.length >= 3;

# ─── add-tests ───────────────────────────────────────────────────────────────
  - description: "add-tests: coverage section present"
    vars:
      skill: add-tests
      scenario: |
        Python function: def calculate_discount(price, pct): return price * (1 - pct/100)
        No existing tests. Run /add-tests.
    prompt: "{{scenario}}\n\nApply the /add-tests skill."
    assert:
      - type: contains
        value: "### Test Coverage Added"
      - type: llm-rubric
        value: "The coverage section mentions at least one happy path, one edge case, and one error path."

# ─── document ────────────────────────────────────────────────────────────────
  - description: "document: docstring added to function"
    vars:
      skill: document
      scenario: |
        Python function with no docstring: def merge_intervals(intervals): ...
        (Merges overlapping [start, end] pairs.)
        Run /document.
    prompt: "{{scenario}}\n\nApply the /document skill."
    assert:
      - type: llm-rubric
        value: "The output includes a docstring (triple-quoted string) that describes what the function does, its parameters, and return value."

# ─── explain ─────────────────────────────────────────────────────────────────
  - description: "explain: no Note line for clean code"
    vars:
      skill: explain
      scenario: |
        Beginner asks to explain: def factorial(n): return 1 if n == 0 else n * factorial(n-1)
        No bugs in this code. Run /explain.
    prompt: "{{scenario}}\n\nApply the /explain skill."
    assert:
      - type: not-contains
        value: "Note:"

  - description: "explain: Note line appears for buggy code"
    vars:
      skill: explain
      scenario: |
        User asks to explain: for i in range(len(arr) - 1): process(arr[i])
        The off-by-one means the last element is skipped. Run /explain.
    prompt: "{{scenario}}\n\nApply the /explain skill."
    assert:
      - type: contains
        value: "Note:"

# ─── simplify ────────────────────────────────────────────────────────────────
  - description: "simplify: Changes Made and Risks sections present"
    vars:
      skill: simplify
      scenario: |
        Python function with 4 levels of nested if statements checking user permissions.
        Run /simplify.
    prompt: "{{scenario}}\n\nApply the /simplify skill."
    assert:
      - type: contains
        value: "### Changes Made"
      - type: contains
        value: "### Risks / Things to Verify"

# ─── source-control (summarize route) ────────────────────────────────────────
  - description: "source-control: routes summarize intent — Summary and Changes sections present"
    vars:
      skill: source-control
      scenario: |
        User pastes a diff: adds export_csv.py (feature), fixes null handling in parse_row() (fix), adds tests.
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill."
    assert:
      - type: contains
        value: "### Summary"
      - type: contains
        value: "### Changes"

  - description: "source-control: routes summarize intent — Summary ≤100 words"
    vars:
      skill: source-control
      scenario: |
        User pastes a diff: adds export_csv.py (feature), fixes null handling in parse_row() (fix), adds tests.
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill."
    assert:
      - type: javascript
        value: |
          const summaryMatch = output.match(/### Summary\n([\s\S]*?)(?=###|$)/);
          if (!summaryMatch) return false;
          const words = summaryMatch[1].trim().split(/\s+/).length;
          return words <= 100;

  - description: "source-control: routes summarize intent — no empty categories"
    vars:
      skill: source-control
      scenario: |
        User pastes a diff: pure refactor — renames utils.js to helpers.js and updates all imports.
        Run /source-control.
    prompt: "{{scenario}}\n\nApply the /source-control skill."
    assert:
      - type: not-contains
        value: "**Feature:**"
      - type: not-contains
        value: "**Fix:**"
      - type: contains
        value: "**Refactor:**"
